name: Build AviStream APK

on:
  push:
    branches: [main]
    paths:
      - 'artifacts/anime-site/**'
      - 'lib/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  build-apk:
    name: Build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── pnpm ─────────────────────────────────────────────────────────────────
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm

      # ── Java (Gradle needs JDK 17+) ──────────────────────────────────────────
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # ── Android SDK ──────────────────────────────────────────────────────────
      - uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Android SDK components
        run: |
          sdkmanager \
            "platform-tools" \
            "platforms;android-36" \
            "build-tools;36.0.0"

      # ── Install dependencies ──────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Generate PNG icons ───────────────────────────────────────────────────
      - name: Generate app icons
        run: node scripts/gen-icons-pure.mjs

      # ── Build web app ─────────────────────────────────────────────────────────
      - name: Build AviStream web
        run: pnpm --filter @workspace/anime-site run build
        env:
          BASE_PATH: "/"
          PORT: "3000"

      # ── Capacitor sync ────────────────────────────────────────────────────────
      - name: Capacitor sync
        working-directory: artifacts/anime-site
        run: npx cap sync android

      # ── Gradle assemble ──────────────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: artifacts/anime-site/android
        run: chmod +x gradlew

      # ── Decode release keystore from secret ──────────────────────────────────
      - name: Decode keystore
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > artifacts/anime-site/android/avistream.jks
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # ── Print SHA-256 fingerprint (copy this into assetlinks.json) ────────────
      - name: Print certificate fingerprint
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        run: |
          keytool -list -v \
            -keystore artifacts/anime-site/android/avistream.jks \
            -alias "${{ secrets.KEY_ALIAS }}" \
            -storepass "${{ secrets.KEYSTORE_PASSWORD }}" \
          | grep "SHA256:"
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # ── Build APK (release if keystore present, debug otherwise) ─────────────
      - name: Build release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        working-directory: artifacts/anime-site/android
        run: |
          ./gradlew assembleRelease --no-daemon \
            -Pandroid.injected.signing.store.file="$GITHUB_WORKSPACE/artifacts/anime-site/android/avistream.jks" \
            -Pandroid.injected.signing.store.password="${{ secrets.KEYSTORE_PASSWORD }}" \
            -Pandroid.injected.signing.key.alias="${{ secrets.KEY_ALIAS }}" \
            -Pandroid.injected.signing.key.password="${{ secrets.KEY_PASSWORD }}"
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Build debug APK (fallback — no keystore)
        if: ${{ env.KEYSTORE_BASE64 == '' }}
        working-directory: artifacts/anime-site/android
        run: ./gradlew assembleDebug --no-daemon
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      # ── Upload artifact ───────────────────────────────────────────────────────
      - name: Upload release APK
        if: ${{ env.KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: AviStream-release-${{ github.sha }}
          path: artifacts/anime-site/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
          if-no-files-found: error
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}

      - name: Upload debug APK (fallback)
        if: ${{ env.KEYSTORE_BASE64 == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: AviStream-debug-${{ github.sha }}
          path: artifacts/anime-site/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
          if-no-files-found: error
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
