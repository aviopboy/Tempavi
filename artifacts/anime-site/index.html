<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5, viewport-fit=cover"
    />
    <title>AviStream</title>
    <meta name="description" content="AviStream — anime & movies streaming." />
    <meta name="robots" content="index, follow" />
    <meta property="og:title" content="AviStream" />
    <meta
      property="og:description"
      content="AviStream — anime & movies streaming."
    />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AviStream" />
    <meta
      name="twitter:description"
      content="AviStream — anime & movies streaming."
    />
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="shortcut icon" type="image/png" href="/icons/icon-192.png" />
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AviStream" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js', { scope: '/' })
            .then(reg => console.log('[SW] registered', reg.scope))
            .catch(err => console.warn('[SW] registration failed', err));
        });
      }
    </script>
  </body>
</html>
